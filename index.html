        if (!blob) { setUrl(null); return; }
        const u = URL.createObjectURL(blob);
        setUrl(u);
        return () => URL.revokeObjectURL(u);
      }, [blob]);
      return url;
    }

    function SightingModal({ sighting, onClose, onDelete, onOpenSpecies, onIdentify }) {
      const sp = speciesById(sighting.speciesId);
      const blobUrl = useBlobUrl(sighting.photoBlob);
      const userPhotoSrc = blobUrl || (sighting.photoPath ? supaPhotoUrl(sighting.photoPath) : null);
      const hasLocation = sighting.lat != null && sighting.lon != null;
      const unidentified = !sp;

      const handleDelete = async () => {
        if (!confirm('Delete this sighting? It will be removed from both phones.')) return;
        await onDelete(sighting.id);
        onClose();
      };

      // Build an OSM embed bbox roughly ~500m around the point.
      const bbox = hasLocation
        ? [sighting.lon - 0.005, sighting.lat - 0.0025, sighting.lon + 0.005, sighting.lat + 0.0025].join(',')
        : null;

      return (
        <div className="modal-wrap">
          <div className="modal">
            <button className="close-btn" onClick={onClose} aria-label="Close">×</button>
            {userPhotoSrc ? (
              <div className="hero">
                <img src={userPhotoSrc} alt="" className="user-photo-hero" />
              </div>
            ) : sp ? (
              <div className="hero"><HeroGallery species={sp} /></div>
            ) : (
              <div className="hero"><span className="species-emoji hero" aria-hidden>❓</span></div>
            )}
            <div className="modal-body">
              <h2>{sp ? sp.name : 'Unidentified sighting'}</h2>
              {sp && <div className="latin-row">{sp.latin}</div>}

              {unidentified && (
                <button className="btn accent" style={{marginTop: 12}} onClick={() => onIdentify(sighting.id)}>
                  Identify species
                </button>
              )}

              <div className="sighting-meta-row">
                {sighting.logger && <span className="logger-chip">{sighting.logger}</span>}
                <span>{fmtDate(sighting.dateISO)}</span>
                <SyncDot state={sighting.syncState} />
              </div>

              {sighting.notes && (
                <div className="where" style={{marginTop:14}}>
                  <strong>Notes</strong>{sighting.notes}
                </div>
              )}

              {hasLocation ? (
                <div style={{marginTop:14}}>
                  <strong className="field-label">Location</strong>
                  <iframe
                    title="Sighting location"
                    src={`https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${sighting.lat}%2C${sighting.lon}`}
                    className="sighting-map"
                    loading="lazy"
                  ></iframe>
                  <div className="muted" style={{marginTop:6, display:'flex', justifyContent:'space-between', gap:8, flexWrap:'wrap'}}>
                    <span>{sighting.lat.toFixed(5)}, {sighting.lon.toFixed(5)}{sighting.accuracy ? ` · ±${Math.round(sighting.accuracy)} m` : ''}</span>
                    <a href={`https://maps.apple.com/?q=${sighting.lat},${sighting.lon}`} target="_blank" rel="noreferrer" style={{color:'var(--accent)'}}>Open in Maps</a>
                  </div>
                </div>
              ) : (
                <div className="muted" style={{marginTop:14}}>No location recorded.</div>
              )}

              <div className="stack" style={{marginTop:18}}>
                {sp && (
                  <button className="btn secondary" onClick={() => { onOpenSpecies(sp.id); onClose(); }}>
                    View {sp.name} details
                  </button>
                )}
                <button className="btn danger" onClick={handleDelete}>Delete sighting</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Log-a-sighting form ───────────────────────────────────────
    function LogModal({ species, onClose, onSave }) {
      const [dateISO, setDateISO] = useState(() => {
        const d = new Date();
        d.setSeconds(0, 0);
        return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
      });
      const [notes, setNotes] = useState('');
      const [coords, setCoords] = useState(null); // {lat, lon, accuracy}
      const [gpsState, setGpsState] = useState('idle'); // idle | locating | error
      const [photoBlob, setPhotoBlob] = useState(null);
      const [photoUrl, setPhotoUrl] = useState(null);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        // Auto-capture GPS on open if available.
        captureGps();
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);
      useEffect(() => () => { if (photoUrl) URL.revokeObjectURL(photoUrl); }, [photoUrl]);

      const captureGps = () => {
        if (!navigator.geolocation) { setGpsState('error'); return; }
        setGpsState('locating');
        navigator.geolocation.getCurrentPosition(
          pos => {
            setCoords({ lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy });
            setGpsState('ok');
          },
          () => setGpsState('error'),
          { enableHighAccuracy: true, timeout: 12000, maximumAge: 30000 }
        );
      };

      const onPhotoPick = async e => {
        const f = e.target.files?.[0];
        if (!f) return;
        const blob = await compressPhoto(f);
        if (photoUrl) URL.revokeObjectURL(photoUrl);
        setPhotoBlob(blob);
        setPhotoUrl(URL.createObjectURL(blob));
      };

      const submit = async () => {
        setSaving(true);
        await onSave({
          id: uid(),
          speciesId: species.id,
          dateISO: new Date(dateISO).toISOString(),
          lat: coords?.lat ?? null,
          lon: coords?.lon ?? null,
          accuracy: coords?.accuracy ?? null,
          notes: notes.trim(),
          photoBlob,
        });
        setSaving(false);
        onClose();
      };

      return (
        <div className="modal-wrap">
          <div className="modal">
            <button className="close-btn" onClick={onClose} aria-label="Close">×</button>
            <div className="modal-body">
            <div className="row" style={{gap:10, marginBottom: 12}}>
              <div className="log-thumb"><SpeciesPhoto species={species} variant="card" /></div>
              <div className="grow">
                <h2 style={{fontSize:18}}>Log a {species.name}</h2>
                <div className="latin-row" style={{margin:0}}>{species.latin}</div>
              </div>
            </div>

            <div className="stack">
              <div>
                <label className="field-label">Photo</label>
                <label className="photo-input">
                  {photoUrl
                    ? <img src={photoUrl} alt="preview" />
                    : <div className="placeholder"><span className="e">📷</span>Tap to take or choose a photo</div>}
                  <input type="file" accept="image/*" capture="environment" onChange={onPhotoPick} />
                </label>
                {photoBlob && (
                  <button className="btn ghost" style={{marginTop:6, fontSize:13}} onClick={() => { setPhotoBlob(null); if (photoUrl) URL.revokeObjectURL(photoUrl); setPhotoUrl(null); }}>
                    Remove photo
                  </button>
                )}
              </div>

              <div>
                <label className="field-label">When</label>
                <input type="datetime-local" value={dateISO} onChange={e => setDateISO(e.target.value)} />
              </div>

              <div>
                <label className="field-label">Location</label>
                {gpsState === 'ok' && coords ? (
                  <div className="card" style={{padding:'10px 12px', display:'flex', justifyContent:'space-between', alignItems:'center', gap:8}}>
                    <div style={{minWidth:0, flex:1, overflow:'hidden'}}>
                      <div style={{fontSize:14, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{coords.lat.toFixed(5)}, {coords.lon.toFixed(5)}</div>
                      <div className="muted">±{Math.round(coords.accuracy)} m · <a target="_blank" rel="noreferrer" href={`https://maps.apple.com/?q=${coords.lat},${coords.lon}`} style={{color:'var(--accent)'}}>open in Maps</a></div>
                    </div>
                    <button className="btn ghost" style={{width:'auto', fontSize:13, padding:'6px 10px', flexShrink:0}} onClick={captureGps}>Re-capture</button>
                  </div>
                ) : (
                  <button className="btn secondary" onClick={captureGps} disabled={gpsState==='locating'}>
                    {gpsState === 'locating' ? 'Locating…' : gpsState === 'error' ? 'Try again' : 'Capture GPS'}
                  </button>
                )}
                {gpsState === 'error' && <div className="gps-status">Couldn't get GPS — you can still save without a location.</div>}
              </div>

              <div>
                <label className="field-label">Notes</label>
                <textarea rows={3} value={notes} onChange={e => setNotes(e.target.value)} placeholder="What it was doing, who was with you, anything memorable…" />
              </div>

              <div className="row" style={{gap: 8, marginTop: 4}}>
                <button className="btn secondary" style={{flex:1}} onClick={onClose}>Cancel</button>
                <button className="btn accent" style={{flex:2}} onClick={submit} disabled={saving}>
                  {saving ? 'Saving…' : 'Save sighting'}
                </button>
              </div>
            </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Settings modal ────────────────────────────────────────────
    function SettingsModal({ settings, onClose, onSave }) {
      const [logger, setLogger] = useState(settings.logger);
      const dirty = logger.trim() && logger !== settings.logger;
      return (
        <div className="modal-wrap">
          <div className="modal">
            <button className="close-btn" onClick={onClose} aria-label="Close">×</button>
            <div className="modal-body" style={{paddingTop: 60}}>
              <h2>Your name</h2>
              <div className="latin-row">So your sightings are tagged.</div>
              <div className="stack" style={{marginTop:14}}>
                <input value={logger} onChange={e => setLogger(e.target.value)} placeholder="e.g. John" maxLength={30} />
                <button className="btn accent" disabled={!dirty} onClick={() => { onSave({ ...settings, logger: logger.trim() }); onClose(); }}>
                  Save
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Identify modal (name a captured sighting) ─────────────────
    // Shared wizard/filter step UI. wizard mode = progressive disclosure with
    // "Step n of 4"; filter mode = all dimensions shown at once.
    function WizardSections({ filter, setFilter, filterMode, dims }) {
      const show = k => !dims || dims.includes(k);
      const stepDone = {
        group: !!filter.group, habitat: filter.habitats.size > 0,
        size: filter.sizes.size > 0, colour: filter.colours.size > 0,
      };
      const allDone = stepDone.group && stepDone.habitat && stepDone.size && stepDone.colour;
      const toggleSet = (key, value) => {
        const next = { ...filter, [key]: new Set(filter[key]) };
        next[key].has(value) ? next[key].delete(value) : next[key].add(value);
        setFilter(next);
      };
      const setGroup = g => setFilter({ ...filter, group: filter.group === g ? null : g });
      const lbl = n => filterMode ? '' : `Step ${n} of 4`;
      return (
        <div className="stack">
          {show('group') && (
          <Section q={filterMode ? 'Kind' : 'What kind of creature?'} step={lbl(1)} selectedLabels={filter.group ? [C.groups.find(g => g.key === filter.group)?.label].filter(Boolean) : []}>
            <div className="options list">
              {C.groups.map(g => (
                <button key={g.key} className={`option ${filter.group === g.key ? 'selected' : ''}`} onClick={() => setGroup(g.key)}>
                  <span className="e">{g.emoji}</span><span>{g.label}</span>
                </button>
              ))}
            </div>
          </Section>
          )}
          {show('habitat') && (filterMode || stepDone.group) && (
            <Section q={filterMode ? 'Where' : 'Where did you see it?'} step={lbl(2)} hint="Tap any that apply" selectedLabels={[...filter.habitats].map(k => C.habitats.find(h => h.key === k)?.label).filter(Boolean)}>
              <div className="options list">
                {C.habitats.map(h => (
                  <button key={h.key} className={`option ${filter.habitats.has(h.key) ? 'selected' : ''}`} onClick={() => toggleSet('habitats', h.key)}>
                    <span className="e">{h.emoji}</span><span>{h.label}</span>
                  </button>
                ))}
              </div>
            </Section>
          )}
          {show('size') && (filterMode || stepDone.habitat) && (
            <Section q={filterMode ? 'Size' : 'How big was it?'} step={lbl(3)} hint="Tap any that fit" selectedLabels={[...filter.sizes].map(k => C.sizes.find(s => s.key === k)?.label).filter(Boolean)}>
              <div className="options list">
                {C.sizes.map(s => (
                  <button key={s.key} className={`option ${filter.sizes.has(s.key) ? 'selected' : ''}`} onClick={() => toggleSet('sizes', s.key)}>
                    <div style={{display:'flex',flexDirection:'column',gap:2}}><span style={{fontWeight:600}}>{s.label}</span><span className="hint">{s.hint}</span></div>
                  </button>
                ))}
              </div>
            </Section>
          )}
          {(filterMode || stepDone.size) && (
            <Section q={filterMode ? 'Colour' : 'Main colour?'} step={lbl(4)} hint="Tap any that apply" selectedLabels={[...filter.colours].map(k => C.colours.find(c => c.key === k)?.label).filter(Boolean)}>
              <div className="options list">
                {C.colours.map(c => (
                  <button key={c.key} className={`option ${filter.colours.has(c.key) ? 'selected' : ''}`} onClick={() => toggleSet('colours', c.key)}>
                    <span className="swatch" style={{background: c.swatch}}></span><span>{c.label}</span>
                  </button>
                ))}
              </div>
            </Section>
          )}
          {(filterMode || allDone) && (
            <Section q={filterMode ? 'Features' : 'Any of these features?'} step={filterMode ? '' : 'Optional refinement'} hint="Useful when the list is still long" selectedLabels={filterMode ? [...filter.features].map(k => C.features.find(f => f.key === k)?.label).filter(Boolean) : []}>
              <div className="chips">
                {C.features.map(f => (
                  <button key={f.key} className={`chip ${filter.features.has(f.key) ? 'active' : ''}`} onClick={() => toggleSet('features', f.key)}>{f.label}</button>
                ))}
              </div>
            </Section>
          )}
        </div>
      );
    }

    // Add-sighting identify: full step-by-step wizard → pick from the live shortlist.
    function IdentifyWizardModal({ onPick, onClose, onDiscard }) {
      const [filter, setFilter] = useState(emptyFilter);
      const matches = useMemo(() => SPECIES.filter(s => matchesFilter(s, filter)), [filter]);
      const started = filter.group != null;
      return (
        <div className="modal-wrap">
          <div className="modal">
            <button className="close-btn" onClick={onClose} aria-label="Close">×</button>
            <div className="modal-body">
              <h2 style={{marginBottom: 4}}>What did you see?</h2>
              <p className="muted" style={{marginBottom: 12}}>Saved. Narrow it down, then tap it — or close to name later.</p>
              <WizardSections filter={filter} setFilter={setFilter} />
              {started && (
                <>
                  <div className="rank-header" style={{marginTop: 12}}>{matches.length} match{matches.length === 1 ? '' : 'es'} — tap to identify</div>
                  {matches.length === 0 ? (
                    <div className="empty"><div className="e">🤔</div><p className="muted">No species fit. Try removing a step.</p></div>
                  ) : (
                    <div className="grid">
                      {matches.map(s => (
                        <button key={s.id} className="species-card" onClick={() => onPick(s.id)}>
                          <div className="photo-wrap"><SpeciesPhoto species={s} variant="card" /></div>
                          <div className="text"><span className="name">{s.name}</span><span className="latin">{s.latin}</span></div>
                        </button>
                      ))}
                    </div>
                  )}
                </>
              )}
              {onDiscard && <button className="btn danger" style={{marginTop: 16}} onClick={onDiscard}>Discard this capture</button>}
            </div>
          </div>
        </div>
      );
    }

    // Browse filter panel — the dimensions NOT shown inline (size, colour, features).
    function FilterModal({ filter, setFilter, onClose }) {
      const matches = useMemo(() => SPECIES.filter(s => matchesFilter(s, filter)), [filter]);
      const clearThese = () => setFilter({ ...filter, sizes: new Set(), colours: new Set(), features: new Set() });
      return (
        <div className="modal-wrap">
          <div className="modal">
            <button className="close-btn" onClick={onClose} aria-label="Close">×</button>
            <div className="modal-body">
              <h2 style={{marginBottom: 12}}>More filters</h2>
              <WizardSections filter={filter} setFilter={setFilter} filterMode dims={['size', 'colour', 'features']} />
              <div className="stack" style={{marginTop: 16}}>
                <button className="btn accent" onClick={onClose}>Show {matches.length} species</button>
                <button className="btn ghost" onClick={clearThese}>Clear these</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Root app ──────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState('browse');
      const [filter, setFilter] = useState(emptyFilter);
      const [sightings, setSightings] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [loggingId, setLoggingId] = useState(null);
      const [viewingSightingId, setViewingSightingId] = useState(null);
      const [settings, setSettings] = useState(loadSettings);
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [syncState, setSyncState] = useState('idle'); // idle | syncing | offline
      const [toast, setToast] = useState(null); // { text, actions: [{label, onClick}] }
      const [pickingForId, setPickingForId] = useState(null); // sighting id awaiting a species
      const toastTimer = useRef(null);

      const showToast = (text, actions, ms = 5000) => {
        setToast({ text, actions: actions || [] });
        if (toastTimer.current) clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToast(null), ms);
      };

      // Lock body scroll while any full-screen modal is open so swipes don't
      // bleed through to the page underneath.
      const anyModalOpen = !!(selectedId || loggingId || viewingSightingId || settingsOpen || pickingForId);
      useEffect(() => {
        if (!anyModalOpen) return;
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = prev; };
      }, [anyModalOpen]);

      // Initial load: pull local + remote, merge.
      useEffect(() => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js').catch(() => {});
          // When a new SW takes over (skipWaiting + clients.claim), reload the
          // page so the new shell is what the user sees — no manual refresh needed.
          let reloaded = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (reloaded) return;
            reloaded = true;
            window.location.reload();
          });
        }
        (async () => {
          const local = await dbAll().catch(() => []);
          setSightings(local);
          // Prompt for name on first launch
          if (!settings.logger) setSettingsOpen(true);
          await pullRemote(settings.tripCode);
          // Retry any local-only sightings (left over from previous offline session)
          for (const s of local) if (s.syncState !== 'synced') pushSighting(s).catch(() => {});
        })();
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      // Refresh when tab becomes visible
      useEffect(() => {
        const onVis = () => { if (!document.hidden) pullRemote(settings.tripCode); };
        document.addEventListener('visibilitychange', onVis);
        const poll = setInterval(onVis, 30000);
        return () => { document.removeEventListener('visibilitychange', onVis); clearInterval(poll); };
      }, [settings.tripCode]);

      // When trip code changes, repull
      useEffect(() => {
        if (settings.tripCode) pullRemote(settings.tripCode);
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [settings.tripCode]);

      async function pullRemote(tripCode) {
        if (!tripCode) return;
        setSyncState('syncing');
        try {
          const rows = await supaFetchTrip(tripCode);
          // Merge remote into local. New remote rows are stored as remoteUrl-only (no blob).
          const local = await dbAll().catch(() => []);
          const localById = new Map(local.map(s => [s.id, s]));
          const merged = [];
          for (const row of rows) {
            const existing = localById.get(row.id);
            const rec = {
              id: row.id,
              tripCode: row.trip_code,
              logger: row.logger,
              speciesId: row.species_id,
              dateISO: row.date_iso,
              lat: row.lat,
              lon: row.lon,
              accuracy: row.accuracy,
              notes: row.notes || '',
              photoBlob: existing?.photoBlob || null,
              photoPath: row.photo_path || null,
              syncState: 'synced',
            };
            await dbPut(rec);
            merged.push(rec);
            localById.delete(row.id);
          }
          // Anything left in localById is local-only (not yet synced or different trip)
          for (const stale of localById.values()) {
            if (stale.tripCode === tripCode) merged.push(stale);
          }
          setSightings(merged);
          setSyncState('idle');
        } catch (e) {
          console.warn('pullRemote failed', e);
          setSyncState('offline');
        }
      }

      async function pushSighting(s) {
        if (s.syncState === 'synced') return;
        try {
          let photoPath = s.photoPath || null;
          if (s.photoBlob && !photoPath) {
            photoPath = await supaUploadPhoto(s.tripCode, s.id, s.photoBlob);
          }
          await supaUpsertSighting({
            id: s.id,
            trip_code: s.tripCode,
            logger: s.logger,
            species_id: s.speciesId,
            date_iso: s.dateISO,
            lat: s.lat,
            lon: s.lon,
            accuracy: s.accuracy,
            notes: s.notes || null,
            photo_path: photoPath,
          });
          const updated = { ...s, photoPath, syncState: 'synced' };
          await dbPut(updated);
          setSightings(prev => prev.map(x => x.id === s.id ? updated : x));
        } catch (e) {
          console.warn('pushSighting failed, will retry later', e);
          const updated = { ...s, syncState: 'pending' };
          await dbPut(updated);
          setSightings(prev => prev.map(x => x.id === s.id ? updated : x));
        }
      }

      const sightingCounts = useMemo(() => {
        const m = {};
        for (const s of sightings) m[s.speciesId] = (m[s.speciesId] || 0) + 1;
        return m;
      }, [sightings]);

      const saveSighting = async sighting => {
        const enriched = {
          ...sighting,
          tripCode: settings.tripCode,
          logger: settings.logger || 'Anon',
          syncState: 'pending',
          photoPath: null,
        };
        await dbPut(enriched);
        setSightings(prev => [...prev.filter(s => s.id !== enriched.id), enriched]);
        pushSighting(enriched);
      };
      const deleteSighting = async id => {
        await dbDel(id);
        setSightings(prev => prev.filter(s => s.id !== id));
        supaDeleteSighting(id).catch(e => console.warn('remote delete failed', e));
      };

      // Patch an existing sighting (by id) with changes, persist, and re-push.
      const patchSighting = async (id, changes) => {
        const all = await dbAll().catch(() => []);
        const found = all.find(s => s.id === id);
        if (!found) return;
        const updated = { ...found, ...changes, syncState: 'pending' };
        await dbPut(updated);
        setSightings(prev => prev.map(s => s.id === id ? updated : s));
        pushSighting(updated);
      };

      // One-tap capture: save the moment instantly (so it's never lost), grab GPS
      // in the background, and immediately open the identify modal to name it.
      const quickLog = async () => {
        const id = uid();
        await saveSighting({
          id, speciesId: null,
          dateISO: new Date().toISOString(),
          lat: null, lon: null, accuracy: null,
          notes: '', photoBlob: null,
        });
        setPickingForId(id);
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            pos => patchSighting(id, { lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy }),
            () => {},
            { enableHighAccuracy: true, timeout: 12000, maximumAge: 30000 }
          );
        }
      };

      const assignSpecies = (id, speciesId) => patchSighting(id, { speciesId });

      const selected = selectedId ? speciesById(selectedId) : null;
      const logging  = loggingId  ? speciesById(loggingId)  : null;

      return (
        <div className="app">
          {view !== 'browse' && (
            <header className="header">
              <div style={{fontSize: 28, lineHeight: 1}}>🦅</div>
              <div className="grow">
                <h1>Skye Wildlife</h1>
                <div className="sub">
                  {settings.logger || 'A field pokedex for your trip'}
                  {syncState === 'syncing' && ' · syncing…'}
                  {syncState === 'offline' && ' · offline'}
                </div>
              </div>
              <button className="settings-btn" onClick={() => setSettingsOpen(true)} aria-label="Settings">⚙</button>
            </header>
          )}

          <Tabs view={view} setView={setView} sightingCount={sightings.length} />

          {view === 'browse' && (
            <BrowseView
              filter={filter}
              setFilter={setFilter}
              sightingCounts={sightingCounts}
              onSelect={setSelectedId}
            />
          )}
          {view === 'sightings' && (
            <SightingsView
              sightings={sightings}
              onOpen={setViewingSightingId}
            />
          )}

          {selected && (
            <SpeciesModal
              species={selected}
              sightings={sightings}
              onClose={() => setSelectedId(null)}
              onLog={() => { setLoggingId(selected.id); setSelectedId(null); }}
            />
          )}
          {logging && (
            <LogModal
              species={logging}
              onClose={() => setLoggingId(null)}
              onSave={saveSighting}
            />
          )}
          {viewingSightingId && (() => {
            const s = sightings.find(x => x.id === viewingSightingId);
            return s ? (
              <SightingModal
                sighting={s}
                onClose={() => setViewingSightingId(null)}
                onDelete={deleteSighting}
                onOpenSpecies={setSelectedId}
                onIdentify={id => { setViewingSightingId(null); setPickingForId(id); }}
              />
            ) : null;
          })()}
          {settingsOpen && (
            <SettingsModal
              settings={settings}
              onClose={() => setSettingsOpen(false)}
              onSave={s => { setSettings(s); saveSettings(s); }}
            />
          )}
          {pickingForId && (
            <IdentifyWizardModal
              onPick={speciesId => { const id = pickingForId; assignSpecies(id, speciesId); setPickingForId(null); showToast('Identified ✓'); setViewingSightingId(id); }}
              onClose={() => setPickingForId(null)}
              onDiscard={() => { deleteSighting(pickingForId); setPickingForId(null); showToast('Capture discarded'); }}
            />
          )}

          {!anyModalOpen && (
            <button className="capture-fab" onClick={quickLog} aria-label="Quick-log a sighting">
              <span className="capture-fab-icon">+</span>
            </button>
          )}
          {toast && (
            <div className="toast">
              <span className="toast-text">{toast.text}</span>
              {toast.actions.map((a, i) => (
                <button key={i} className="toast-action" onClick={a.onClick}>{a.label}</button>
              ))}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
